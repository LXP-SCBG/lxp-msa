# LXP MSA 전체 스택. 각 서비스의 Dockerfile을 빌드해서 하나의 네트워크로 묶는다.
# 포트는 각 서비스 application.yml의 server.port 값을 그대로 노출한다.
# 실행:  docker compose up --build

services:
  # ---------------------------------------------------------------
  # DB: 서비스들의 datasource가 바라보는 MySQL.
  # db/schema.sql -> data.sql 순서로 최초 1회 자동 실행된다(볼륨이 비어 있을 때만).
  # ---------------------------------------------------------------
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: LXP
      MYSQL_USER: sohee
      MYSQL_PASSWORD: sohee
    ports:
      # 호스트 3308 -> 컨테이너 3306. 컨테이너끼리는 mysql:3306으로 통신한다.
      - "3308:3306"
    networks:
      - lxp-net
    volumes:
      - mysql-data:/var/lib/mysql
      # utf8mb4 강제. 한글 시드 데이터가 깨지지 않게 서버·클라이언트 charset 고정.
      - ./db/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
      # 파일명 알파벳 순으로 실행되므로 01/02 접두어로 순서를 고정한다.
      # - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # - ./db/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psohee", "-usohee"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  # Consul: 서비스 디스커버리(레지스트리). enrollment-service 인스턴스들이
  # 여기에 자기 주소를 등록하고, gateway가 lb://enrollment-service를 풀 때 이 목록을 조회한다.
  # dev 모드 = 단일 노드 인메모리(비영속). 개발/부하테스트용으로 충분하다.
  #   UI/API:  http://localhost:8500
  # ---------------------------------------------------------------
  consul:
    image: hashicorp/consul:1.20
    command: agent -dev -client=0.0.0.0 -ui
    ports:
      - "8500:8500"      # HTTP API + 웹 UI
    networks:
      - lxp-net
    healthcheck:
      # 리더가 선출돼야(=클러스터 준비 완료) 등록을 받는다. 이 시점부터 depends_on 통과.
      test: ["CMD", "consul", "info"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------
  # 백엔드 서비스들. datasource URL은 application.yml에 localhost로 박혀 있어
  # SPRING_DATASOURCE_URL 환경변수로 mysql 컨테이너 주소를 덮어쓴다.
  # ---------------------------------------------------------------
  member-service:
    build: ./member-service
    ports:
      - "9080:9080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/LXP
    networks:
      - lxp-net
    depends_on:
      mysql:
        condition: service_healthy

  lecture-service:
    build: ./lecture-service
    ports:
      - "9081:9081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/LXP
      # 내부 API 호출 대상. localhost가 아니라 컨테이너 이름으로.
      MEMBER_API_URI: http://member-service:9080
    networks:
      - lxp-net
    depends_on:
      mysql:
        condition: service_healthy

  enrollment-service:
    build: ./enrollment-service
    ports:
      # 호스트 포트는 고정하지 않는다(스케일 시 충돌 방지). compose가 각 인스턴스에
      # 빈 호스트 포트를 임의 배정한다. 실제 포트는 아래로 확인:
      #   docker compose port enrollment-service 9082   (인스턴스별로 --index 1/2/3)
      # 트래픽은 gateway(lb://enrollment-service) + Consul 디스커버리로 라우팅된다.
      - "9082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/LXP
      MEMBER_API_URI: http://member-service:9080
      # 강의 조회는 gRPC로. 이름 기반이라 컨테이너 IP가 바뀌어도 Docker DNS가 찾아준다.
      LECTURE_GRPC_TARGET: static://lecture-service:9091
      CONSUL_HOST: consul            # application.yml의 ${CONSUL_HOST}를 consul 컨테이너로
    networks:
      - lxp-net
    depends_on:
      mysql:
        condition: service_healthy
      consul:
        condition: service_healthy   # Consul 리더 선출(등록 준비 완료) 후 시작
    deploy:
      replicas: 3                    # enrollment-service 인스턴스 3개

  goal-service:
    build: ./goal-service
    ports:
      - "9083:9083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/LXP
      MEMBER_API_URI: http://member-service:9080
    networks:
      - lxp-net
    depends_on:
      mysql:
        condition: service_healthy

  # ---------------------------------------------------------------
  # 게이트웨이: 외부 단일 진입점(7070). 라우팅 대상 주소를 컨테이너 이름으로 주입한다.
  # (application.yaml의 *_URL 기본값은 localhost라 compose에선 서비스명으로 덮어쓴다)
  # ---------------------------------------------------------------
  gateway:
    build: ./gateway
    ports:
      - "7070:7070"
    environment:
      MEMBER_URL: http://member-service:9080
      LECTURE_URL: http://lecture-service:9081
      GOAL_URL: http://goal-service:9083
      # enrollment는 lb://enrollment-service로 Consul에서 찾으므로 ENROLLMENT_URL 대신 CONSUL_HOST 주입
      CONSUL_HOST: consul
      # 로드밸런서가 고른 실제 인스턴스 URL(IP:9082)을 gateway 로그에 남긴다.
      # ReactiveLoadBalancerClientFilter가 TRACE에서 "url chosen: http://<ip>:9082/..."를 찍는다.
      # (env로는 대소문자 섞인 클래스명 로거를 못 잡으므로 소문자 패키지 레벨로 지정)
      # → 어느 enrollment-service로 라우팅됐는지 gateway 로그만으로 확인 가능.
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_GATEWAY_FILTER: TRACE
    networks:
      - lxp-net
    depends_on:
      - member-service
      - lecture-service
      - enrollment-service
      - goal-service
      - consul

  # ---------------------------------------------------------------
  # 프론트(Next.js standalone). API_BASE_URL은 브라우저에서 접근하는 주소라
  # 빌드 시점에 localhost:7070(게이트웨이 노출 포트)로 굽는다.
  # ---------------------------------------------------------------
  front:
    build:
      context: ./front
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:7070
    ports:
      - "3000:3000"
    networks:
      - lxp-net
    depends_on:
      - gateway

  # ===============================================================
  # 관측(Observability) 스택
  #   - Prometheus : 각 서비스 /actuator/prometheus 를 긁어 메트릭 저장 (pull)
  #   - Loki       : 로그 저장소
  #   - Alloy      : 컨테이너 stdout 로그를 수집해 Loki로 전송 (push)
  #   - Grafana    : Prometheus·Loki를 조회해 시각화하는 대시보드 UI
  # 설정 파일은 ./observability 아래에 둔다.
  # ===============================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    ports:
      - "9090:9090"
    volumes:
      # 스크랩 대상(각 서비스)을 정의한 설정.
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - lxp-net
    depends_on:
      - gateway

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/loki-config.yaml
    networks:
      - lxp-net

  alloy:
    image: grafana/alloy:v1.5.1
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"          # Alloy 자체 UI(파이프라인 상태 확인용)
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      # 컨테이너 로그를 읽기 위해 도커 소켓과 로그 디렉토리를 읽기 전용으로 마운트.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - lxp-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.4.0
    # front가 3000을 쓰므로 호스트 3001 -> 컨테이너 3000으로 노출한다.
    ports:
      - "3001:3000"
    environment:
      # 로컬 개발용 기본 계정. 운영 전환 시 반드시 변경한다.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - lxp-net
    depends_on:
      - prometheus
      - loki

# 모든 컨테이너가 이 네트워크에 붙어 서비스명으로 서로를 찾는다.
networks:
  lxp-net:
    driver: bridge

volumes:
  mysql-data:
