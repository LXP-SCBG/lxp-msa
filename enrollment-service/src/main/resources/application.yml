spring:
  application:
    name: enrollment-service
  datasource:
    url: jdbc:mysql://localhost:3306/LXP
    username: sohee
    password: sohee
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true

server:
  port: 9082

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ohgiraffers.enrollmentservice: DEBUG
