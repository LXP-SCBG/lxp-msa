spring:
  application:
    name: gateway

  cloud:
    # Consul 조회 전용: enrollment-service 인스턴스 목록을 여기서 받아 lb://로 라우팅한다.
    consul:
      host: ${CONSUL_HOST:localhost}   # 도커에선 env로 consul 컨테이너 주입
      port: 8500
      discovery:
        register: false                # 게이트웨이 자신은 등록 안 함(enrollment LB만 목적, 조회만)

    # Spring Cloud Gateway 5.x(Boot 4 트레인)부터 라우트 설정 prefix가 서버 종류별로 갈라졌다.
    # WebFlux 서버는 spring.cloud.gateway.server.webflux.routes 아래에 적는다(구 flat 키는 바인딩 안 됨).
    gateway:
      server:
        webflux:
          routes:              # 들어온 요청의 경로를 보고 어느 서비스로 보낼지 정한다.
            # 주소는 환경변수로 덮어쓸 수 있다 (기본값: 로컬 실행용 localhost).
            # 도커에선 -e MEMBER_URL=http://host.docker.internal:9080 식으로 주입한다.
            - id: member-service
              uri: ${MEMBER_URL:http://localhost:9080}   # Consul 도입 시 lb://로 교체
              predicates:
                - Path=/auth/**,/members/**   # 콤마로 이으면 둘 중 하나만 맞아도 매칭
            - id: lecture-service
              uri: ${LECTURE_URL:http://localhost:9081}
              predicates:
                - Path=/lectures/**
            - id: enrollment-service
              uri: lb://enrollment-service   # Consul이 준 인스턴스 목록에서 라운드로빈으로 호출
              predicates:
                - Path=/enrollments/**
            - id: goal-service
              uri: ${GOAL_URL:http://localhost:9083}
              predicates:
                - Path=/goals/**
            # /api/v1/** (서비스 간 내부 API)는 일부러 라우트에 없다.
            # 게이트웨이에 없는 경로 = 외부에서 접근 불가. 내부 호출은 서비스끼리 직접 포트로 한다.

# 게이트웨이가 직접 호출하는 서비스 주소 (로그인/회원가입 오케스트레이션)
# 라우트의 member-service와 같은 값을 쓴다. TODO: Consul 도입 시 lb://member-service 로 교체
services:
  member:
    url: ${MEMBER_URL:http://localhost:9080}

server:
  port: 7070                   # 외부의 단일 진입점. front는 이 포트만 안다.

management:
  endpoints:
    web:
      exposure:
        # health,gateway에 더해 prometheus/metrics 노출(Prometheus 스크랩 대상).
        include: health, gateway, prometheus, metrics
  endpoint:
    gateway:
      # gateway 엔드포인트는 기본 비활성. 노출 목록에 넣는 것만으론 404가 난다(SCG 5.x).
      access: read-only
    health:
      show-details: always
