spring:
  application:
    name: lecture-service
  grpc:
    server:
      port: 9091    # gRPC 서버 포트(HTTP/2). REST(9081, HTTP/1.1)와 별개 리스너로 함께 뜬다.
  datasource:
    url: jdbc:mysql://localhost:3306/LXP
    username: sohee
    password: sohee
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true

server:
  port: 9081

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.ohgiraffers.lectureservice: DEBUG
