spring:
  application:
    name: member-service
  datasource:
    url: jdbc:mysql://localhost:3306/LXP
    username: sohee
    password: sohee
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true

server:
  port: 9080

# 로그 레벨. 개발 중엔 우리 패키지만 debug로 열어 내부 API 호출 추적까지 본다.
# 운영 전환 시 info로 올리면 debug 로그(내부 호출 추적)는 자동으로 꺼진다.
logging:
  level:
    com.ohgiraffers.memberservice: debug
